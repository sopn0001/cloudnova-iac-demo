name: CloudNova IaC Review and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'policies/**'
      - 'scripts/**'
      - '.github/workflows/iac-review-deploy.yml'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'infra/**'
      - 'policies/**'
      - 'scripts/**'
      - '.github/workflows/iac-review-deploy.yml'

env:
  AZURE_REGION: canadacentral
  RESOURCE_GROUP: rg-cloudnova-dev
  KEY_VAULT_NAME: kv-cloudnova-dev

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  detect-changes:
    name: Detect changed Terraform
    runs-on: ubuntu-latest
    outputs:
      review_template: ${{ steps.changes.outputs.review_template }}
      terraform_dirs: ${{ steps.changes.outputs.terraform_dirs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find Terraform files in PR
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- 'infra/**/*.tf' | sort -u)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'infra/**/*.tf' | sort -u)
          fi

          if [ -z "$CHANGED" ]; then
            REVIEW_TEMPLATE="infra/terraform/flawed/main.tf"
            TERRAFORM_DIRS="infra/terraform/flawed infra/terraform/fixed"
          else
            REVIEW_TEMPLATE=$(echo "$CHANGED" | grep 'main\.tf' | head -1)
            if [ -z "$REVIEW_TEMPLATE" ]; then
              REVIEW_TEMPLATE=$(echo "$CHANGED" | head -1)
            fi
            TERRAFORM_DIRS=$(echo "$CHANGED" | xargs -I{} dirname {} | sort -u | tr '\n' ' ')
          fi

          echo "review_template=$REVIEW_TEMPLATE" >> "$GITHUB_OUTPUT"
          echo "terraform_dirs=$TERRAFORM_DIRS" >> "$GITHUB_OUTPUT"
          echo "Review template: $REVIEW_TEMPLATE"
          echo "Terraform dirs: $TERRAFORM_DIRS"

  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform init and validate (flawed)
        working-directory: infra/terraform/flawed
        run: |
          terraform init -backend=false -input=false
          terraform validate

      - name: Terraform init and validate (fixed)
        working-directory: infra/terraform/fixed
        run: |
          terraform init -backend=false -input=false
          terraform validate

  security-scan:
    name: Policy-as-Code (Checkov)
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov on changed Terraform
        id: checkov
        continue-on-error: true
        run: |
          pip install --quiet checkov
          checkov -d infra/terraform/ --framework terraform --config-file policies/checkov.yaml --compact \
            | tee checkov-output.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload Checkov output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-output
          path: checkov-output.txt

  ai-review:
    name: AI Review PR Comment
    runs-on: ubuntu-latest
    needs: [detect-changes, validate-terraform, security-scan]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Download Checkov output
        uses: actions/download-artifact@v4
        with:
          name: checkov-output
        continue-on-error: true

      - name: Generate CloudNova review summary
        run: |
          python3 scripts/generate_review_summary.py \
            --template "${{ needs.detect-changes.outputs.review_template }}" \
            --standards policies/naming-standards.json \
            --checkov-file checkov-output.txt \
            --output ai-review-summary.md

      - name: Post review summary on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: ai-review-summary.md
          header: cloudnova-ai-iac-review

      - name: Block merge if critical issues remain
        run: |
          python3 scripts/generate_review_summary.py \
            --template "${{ needs.detect-changes.outputs.review_template }}" \
            --standards policies/naming-standards.json \
            --fail-on-critical

  deploy-dev:
    name: Deploy to Azure (fixed Terraform)
    runs-on: ubuntu-latest
    needs: [validate-terraform, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Create resource group via Terraform
        working-directory: infra/terraform/fixed
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init -backend=false -input=false
          terraform apply -auto-approve -target=azurerm_resource_group.main \
            -var="app_name=saasapi" \
            -var="environment=dev" \
            -var="resource_group_name=${{ env.RESOURCE_GROUP }}" \
            -var="key_vault_id=/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.KeyVault/vaults/${{ env.KEY_VAULT_NAME }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Ensure Key Vault exists
        run: |
          if ! az keyvault show --name ${{ env.KEY_VAULT_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} >/dev/null 2>&1; then
            az keyvault create \
              --name ${{ env.KEY_VAULT_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --location ${{ env.AZURE_REGION }} \
              --enable-rbac-authorization true
          fi

      - name: Grant Key Vault access to deployment identity
        run: |
          DEPLOYER_ID=$(az ad sp show --id ${{ secrets.AZURE_CLIENT_ID }} --query id -o tsv)
          KV_ID=$(az keyvault show --name ${{ env.KEY_VAULT_NAME }} --resource-group ${{ env.RESOURCE_GROUP }} --query id -o tsv)
          az role assignment create \
            --assignee-object-id "$DEPLOYER_ID" \
            --assignee-principal-type ServicePrincipal \
            --role "Key Vault Secrets User" \
            --scope "$KV_ID" \
            2>/dev/null || true

      - name: Terraform plan and apply to Azure
        working-directory: infra/terraform/fixed
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init -backend=false -input=false
          terraform plan \
            -var="app_name=saasapi" \
            -var="environment=dev" \
            -var="resource_group_name=${{ env.RESOURCE_GROUP }}" \
            -var="key_vault_id=/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.KeyVault/vaults/${{ env.KEY_VAULT_NAME }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"
          terraform apply -auto-approve \
            -var="app_name=saasapi" \
            -var="environment=dev" \
            -var="resource_group_name=${{ env.RESOURCE_GROUP }}" \
            -var="key_vault_id=/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.KeyVault/vaults/${{ env.KEY_VAULT_NAME }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Deployment summary
        run: |
          echo "### Azure deployment complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- Resource group: ${{ env.RESOURCE_GROUP }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Region: ${{ env.AZURE_REGION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Template: infra/terraform/fixed/" >> "$GITHUB_STEP_SUMMARY"
